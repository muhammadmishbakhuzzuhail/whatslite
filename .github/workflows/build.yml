name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pure-Go Gio UI with the engine IN-PROCESS (what ships). Svelte/Wails removed.
  gio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Gio + media deps
        run: |
          sudo apt-get update
          # Gio (X11/Wayland/GL) + voice (libopus) + video (libmpv) cgo deps.
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libwayland-dev libxkbcommon-dev \
            libx11-dev libxcursor-dev libxfixes-dev libvulkan-dev \
            libopus-dev libmpv-dev pkg-config

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build Gio app
        run: go build -o whatslite-gio ./cmd/whatslite-gio

      - name: Build headless render tool
        run: go build -o gio-shot ./cmd/gio-shot

      - name: Upload Gio artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whatslite-gio-linux
          path: |
            whatslite-gio
            gio-shot
