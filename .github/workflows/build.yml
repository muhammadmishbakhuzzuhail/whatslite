name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps (WebKitGTK 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Frontend deps
        run: npm --prefix frontend ci

      - name: Lint CSS
        run: npm --prefix frontend run lint:css

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Wails build
        run: wails build -tags "webkit2_41 netgo"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatslite-linux
          path: build/bin/whatslite

  # Primary frontend: headless Go engine + Qt6/QML UI (what the Flatpak ships).
  qt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Qt6 + QML modules
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-svg-dev libqt6svg6 \
            qml6-module-qtquick-controls qml6-module-qtquick-layouts \
            qml6-module-qtquick-dialogs qml6-module-qtquick-window \
            qml6-module-qt5compat-graphicaleffects qml6-module-qtqml-workerscript

      - name: Build headless engine
        run: go build -o whatslite-engine ./cmd/whatslite-engine

      - name: Build Qt UI
        run: |
          cmake -B qt-app/build -S qt-app -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build qt-app/build -j

      - name: qmllint
        run: qmllint -I /usr/lib/qt6/qml -I qt-app qt-app/main.qml

      - name: Upload Qt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whatslite-qt-linux
          path: |
            qt-app/build/walite-qt
            whatslite-engine
