name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps (WebKitGTK 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Frontend deps
        run: npm --prefix frontend ci

      - name: Lint CSS
        run: npm --prefix frontend run lint:css

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Wails build
        run: wails build -tags "webkit2_41 netgo"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-lite-linux
          path: build/bin/whatsapp-lite
