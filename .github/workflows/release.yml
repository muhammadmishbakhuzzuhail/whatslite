name: release

# Cut a GitHub Release when a version tag is pushed:
#   git tag -a vX.Y.Z -m "Release vX.Y.Z" && git push origin vX.Y.Z
# Builds the Linux binary natively (Wails uses cgo + WebKitGTK and cannot
# cross-compile), stamps the version, and uploads it to the release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  release:
    # Build on the OLDEST supported toolchain so the cgo binary's glibc floor
    # stays low (22.04 → glibc 2.35). ubuntu-latest (24.04, glibc 2.39) would
    # exclude 22.04 users. See README "Compatibility".
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps (WebKitGTK 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (stamped with the tag version)
        run: wails build -tags "webkit2_41 netgo" -clean -ldflags "-X main.version=${GITHUB_REF_NAME}"

      - name: Verify version is embedded
        run: |
          if strings build/bin/whatslite | grep -qF "${GITHUB_REF_NAME}"; then
            echo "version ${GITHUB_REF_NAME} embedded ✓"
          else
            echo "::error::version string ${GITHUB_REF_NAME} not found in binary"; exit 1
          fi

      - name: Stage release asset
        run: |
          mkdir -p dist
          cp build/bin/whatslite "dist/whatslite-${GITHUB_REF_NAME}-linux-amd64"

      - name: Release notes from CHANGELOG
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {f=0}
            f && /^\[[^]]+\]:/ {f=0}
            f' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release ${GITHUB_REF_NAME}." > notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            "dist/whatslite-${GITHUB_REF_NAME}-linux-amd64"
