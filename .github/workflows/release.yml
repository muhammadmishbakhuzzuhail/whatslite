name: release

# Cut a GitHub Release when a version tag is pushed:
#   git tag -a vX.Y.Z -m "Release vX.Y.Z" && git push origin vX.Y.Z
# Builds the Linux binary natively (Gio uses cgo for GL/Wayland/voice/video and
# cannot cross-compile), stamps the version, and uploads it to the release.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  release:
    # Build on the OLDEST supported toolchain so the cgo binary's glibc floor
    # stays low (22.04 → glibc 2.35). ubuntu-latest (24.04, glibc 2.39) would
    # exclude 22.04 users. See README "Compatibility".
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Gio + media deps
        run: |
          sudo apt-get update
          # Gio (X11/Wayland/GL) + voice (libopus) + video (libmpv) cgo deps.
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libwayland-dev libxkbcommon-dev \
            libx11-dev libxcursor-dev libxfixes-dev libvulkan-dev \
            libopus-dev libmpv-dev pkg-config

      - name: Build (stamped with the tag version)
        run: go build -o whatslite-gio -ldflags "-X main.version=${GITHUB_REF_NAME}" ./cmd/whatslite-gio

      - name: Verify version is embedded
        run: |
          if strings whatslite-gio | grep -qF "${GITHUB_REF_NAME}"; then
            echo "version ${GITHUB_REF_NAME} embedded ✓"
          else
            echo "::error::version string ${GITHUB_REF_NAME} not found in binary"; exit 1
          fi

      - name: Stage release asset
        run: |
          mkdir -p dist
          cp whatslite-gio "dist/whatslite-${GITHUB_REF_NAME}-linux-amd64"

      - name: Release notes from CHANGELOG
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {f=0}
            f && /^\[[^]]+\]:/ {f=0}
            f' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release ${GITHUB_REF_NAME}." > notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            "dist/whatslite-${GITHUB_REF_NAME}-linux-amd64"

  # Universal cross-distro artifact. Runs after the release exists, builds the
  # Flatpak for the tagged version, and attaches the .flatpak bundle.
  flatpak:
    needs: release
    runs-on: ubuntu-22.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Point manifest at the tagged source + version
        run: |
          tag="${GITHUB_REF_NAME}"
          m=packaging/flatpak/io.github.muhammadmishbakhuzzuhail.WhatsLite.yml
          curl -sL "https://github.com/${GITHUB_REPOSITORY}/archive/${tag}.tar.gz" -o /tmp/src.tgz
          sha=$(sha256sum /tmp/src.tgz | cut -d' ' -f1)
          sed -i \
            -e "s#/archive/v0\.1\.0\.tar\.gz#/archive/${tag}.tar.gz#" \
            -e "s#sha256: [0-9a-f]\{64\}#sha256: ${sha}#" \
            -e "s#main\.version=v0\.1\.0#main.version=${tag}#" \
            "$m"

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: whatslite-${{ github.ref_name }}.flatpak
          manifest-path: packaging/flatpak/io.github.muhammadmishbakhuzzuhail.WhatsLite.yml
          cache-key: flatpak-${{ github.ref_name }}

      - name: Attach bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: whatslite-${{ github.ref_name }}.flatpak
