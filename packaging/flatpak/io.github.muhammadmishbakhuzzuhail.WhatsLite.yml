# Flatpak manifest for WhatsLite.
#
# Universal Linux path: the GNOME runtime bundles WebKitGTK 4.1 + glibc, so a
# Flatpak runs on distros that lack 4.1 or have an old glibc (Ubuntu 20.04,
# Debian 11, RHEL/Rocky/Alma, etc.) — neither host gate applies.
#
# Build + install locally:
#   flatpak install -y flathub org.gnome.Platform//48 org.gnome.Sdk//48 \
#     org.freedesktop.Sdk.Extension.golang//24.08 org.freedesktop.Sdk.Extension.node20//24.08
#   flatpak-builder --user --install --force-clean build-flatpak \
#     packaging/flatpak/io.github.muhammadmishbakhuzzuhail.WhatsLite.yml
#   flatpak run io.github.muhammadmishbakhuzzuhail.WhatsLite
#
# NOTE: this manifest fetches Go modules + npm during build (build-args:
# --share=network). That is fine for LOCAL / self-hosted repos but Flathub
# forbids network at build time — a Flathub submission must vendor Go modules
# and use flatpak-node-generator for npm. See packaging/flatpak/README.md.

app-id: io.github.muhammadmishbakhuzzuhail.WhatsLite
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node20
command: whatslite

finish-args:
  - --share=network            # whatsmeow websocket + media CDN + Tenor/translate
  - --share=ipc                # X11 shared memory
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio        # voice-note recording + playback
  - --device=dri               # GPU for WebKitGTK rendering
  - --filesystem=xdg-download:rw  # exporting chats / saving files
  # App data (session, messages, media cache) lives in the per-app
  # ~/.var/app/<id>/{data,cache} automatically — no extra filesystem grant.

modules:
  - name: whatslite
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node20/bin
      build-args:
        - --share=network
      env:
        GOFLAGS: "-mod=mod"
    build-commands:
      - |
        set -e
        export GOPATH="$PWD/.gopath" GOBIN="$PWD/.gobin"
        export PATH="$PWD/.gobin:$PATH"
        export npm_config_cache="$PWD/.npmcache"
        go install github.com/wailsapp/wails/v2/cmd/wails@latest
        wails build -tags "webkit2_41 netgo" -clean -ldflags "-X main.version=v0.1.0"
      - install -Dm755 build/bin/whatslite /app/bin/whatslite
      - install -Dm644 build/linux/whatslite.svg
          /app/share/icons/hicolor/scalable/apps/io.github.muhammadmishbakhuzzuhail.WhatsLite.svg
      - |
        d=/app/share/applications/io.github.muhammadmishbakhuzzuhail.WhatsLite.desktop
        install -Dm644 build/linux/whatslite.desktop "$d"
        sed -i 's/^Exec=.*/Exec=whatslite/; s/^Icon=.*/Icon=io.github.muhammadmishbakhuzzuhail.WhatsLite/' "$d"
      - install -Dm644 io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
          /app/share/metainfo/io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/muhammadmishbakhuzzuhail/whatslite/archive/v0.1.0.tar.gz
        sha256: 34f76e64bd3c74f34ed95eb73db89d3b3aaa4796ca792339a322feca63ffdfa7
      - type: file
        path: io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
