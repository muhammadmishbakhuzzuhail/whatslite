# Flatpak manifest for WhatsLite (Qt6/QML frontend + headless Go engine).
#
# The frontend was rewritten from Svelte/Wails (WebKitGTK) to Qt6/QML, so this
# ships on the KDE runtime (bundles Qt6 + QtQuick Controls + Qt5Compat +
# qt6-svg) rather than the GNOME/WebKitGTK runtime. The legacy Svelte/Wails UI
# stays in the repo for rollback but is no longer the packaged frontend.
#
# Two binaries are installed and launched together by the `whatslite` wrapper:
#   whatslite-engine  — headless whatsmeow + SQLite core, serves an NDJSON bridge
#   walite-qt         — Qt6/QML UI that connects to the engine's bridge.sock
#
# Build + install locally:
#   flatpak install -y flathub org.kde.Platform//6.8 org.kde.Sdk//6.8 \
#     org.freedesktop.Sdk.Extension.golang//24.08
#   flatpak-builder --user --install --force-clean build-flatpak \
#     packaging/flatpak/io.github.muhammadmishbakhuzzuhail.WhatsLite.yml
#   flatpak run io.github.muhammadmishbakhuzzuhail.WhatsLite
#
# NOTE: this manifest fetches Go modules during build (build-args:
# --share=network). Fine for LOCAL / self-hosted repos; a Flathub submission
# must vendor Go modules instead. See packaging/flatpak/README.md.

app-id: io.github.muhammadmishbakhuzzuhail.WhatsLite
runtime: org.kde.Platform
runtime-version: "6.8"
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: whatslite

finish-args:
  - --share=network            # whatsmeow websocket + media CDN + Tenor/Stickerly
  - --share=ipc                # X11 shared memory
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio        # voice-note recording + playback
  - --device=dri               # GPU for Qt Quick rendering
  - --filesystem=xdg-download:rw  # exporting chats / saving files
  # App data (session, messages, media cache) lives in the per-app
  # ~/.var/app/<id>/{data,cache} automatically — no extra filesystem grant.

modules:
  - name: whatslite
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      build-args:
        - --share=network
      env:
        GOFLAGS: "-mod=mod"
    build-commands:
      # 1. Headless Go engine (cgo + SQLite). CGO is on by default.
      - |
        set -e
        export GOPATH="$PWD/.gopath" GOBIN="$PWD/.gobin"
        go build -o whatslite-engine -ldflags "-X main.version=v0.1.0" ./cmd/whatslite-engine
        install -Dm755 whatslite-engine /app/bin/whatslite-engine
      # 2. Qt6/QML UI.
      - |
        set -e
        cmake -B qt-app/build -S qt-app -DCMAKE_BUILD_TYPE=Release
        cmake --build qt-app/build -j"$FLATPAK_BUILDER_N_JOBS"
        install -Dm755 qt-app/build/walite-qt /app/bin/walite-qt
      # 3. QML resources (main.qml + components + i18n + wallpaper) → /app/share.
      - |
        set -e
        d=/app/share/whatslite
        install -Dm644 qt-app/main.qml   "$d/main.qml"
        install -Dm644 qt-app/Avatar.qml "$d/Avatar.qml"
        install -Dm644 qt-app/Icon.qml   "$d/Icon.qml"
        for f in qt-app/i18n/*.json;   do install -Dm644 "$f" "$d/i18n/$(basename "$f")"; done
        for f in qt-app/assets/*.png;  do install -Dm644 "$f" "$d/assets/$(basename "$f")"; done
      # 4. Launcher: start the engine, wait for its bridge socket, run the UI.
      - install -Dm755 whatslite-launcher /app/bin/whatslite
      # 5. Icon + desktop entry + AppStream metainfo.
      - install -Dm644 build/linux/whatslite.svg
          /app/share/icons/hicolor/scalable/apps/io.github.muhammadmishbakhuzzuhail.WhatsLite.svg
      - install -Dm644 io.github.muhammadmishbakhuzzuhail.WhatsLite.desktop
          /app/share/applications/io.github.muhammadmishbakhuzzuhail.WhatsLite.desktop
      - install -Dm644 io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
          /app/share/metainfo/io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
    sources:
      - type: archive
        # NOTE: bump to a release tag that CONTAINS the Qt frontend before a real
        # build (v0.1.0 predates qt-app/). sha256 must match the bumped tarball.
        url: https://github.com/muhammadmishbakhuzzuhail/whatslite/archive/v0.1.0.tar.gz
        sha256: 34f76e64bd3c74f34ed95eb73db89d3b3aaa4796ca792339a322feca63ffdfa7
      - type: script
        dest-filename: whatslite-launcher
        commands:
          - export WALITE_RESOURCE_DIR=/app/share/whatslite
          - '/app/bin/whatslite-engine &'
          - 'engine=$!'
          - "trap 'kill $engine 2>/dev/null || true' EXIT INT TERM"
          - 'sock="${XDG_DATA_HOME:-$HOME/.local/share}/whatslite/bridge.sock"'
          - 'i=0; while [ ! -S "$sock" ] && [ "$i" -lt 100 ]; do sleep 0.1; i=$((i+1)); done'
          - 'exec /app/bin/walite-qt "$sock"'
      - type: file
        path: io.github.muhammadmishbakhuzzuhail.WhatsLite.desktop
      - type: file
        path: io.github.muhammadmishbakhuzzuhail.WhatsLite.metainfo.xml
